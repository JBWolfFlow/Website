<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true" role="img">
  <title>Paper airplane</title>
  <defs>
    <!-- Upper wing: light amber → vivid orange -->
    <linearGradient id="planeUpper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC370" />
      <stop offset="100%" stop-color="#FF8A1E" />
    </linearGradient>
    <!-- Lower fold face: deeper orange → burnt, shows shadow of folded paper -->
    <linearGradient id="planeLower" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E27514" />
      <stop offset="100%" stop-color="#B5520A" />
    </linearGradient>
    <!-- Highlight along the crease -->
    <linearGradient id="planeCrease" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE0A8" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#FFB04A" stop-opacity="0.7" />
    </linearGradient>
    <!-- Soft warm glow halo -->
    <filter id="planeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" />
    </filter>
  </defs>

  <!--
    Geometry: classic 4-point paper-airplane silhouette (think Lucide `send`, Telegram).
    A = nose (top-right)        : (58.7,  5.3)
    B = tail-back tip           : (40,    58.7)
    C = body center / fold      : (29.3,  34.7)   <- the "kink"
    D = far wing tip            : ( 5.3,  24)
    Outer dart: A -> B -> C -> D -> close
    Internal crease: A -> C  (the folded centerline of the paper)
  -->

  <!-- Warm glow halo behind the plane -->
  <g filter="url(#planeGlow)" opacity="0.55">
    <path d="M58.7 5.3 L40 58.7 L29.3 34.7 L5.3 24 Z" fill="#FF8A1E" />
  </g>

  <!-- Upper wing face (light) — A -> D -> C  -->
  <path d="M58.7 5.3 L5.3 24 L29.3 34.7 Z" fill="url(#planeUpper)" />

  <!-- Lower fold face (darker, the back wing showing underside) — A -> C -> B  -->
  <path d="M58.7 5.3 L29.3 34.7 L40 58.7 Z" fill="url(#planeLower)" />

  <!-- Crease highlight: bright line from nose down to the body-fold point -->
  <line
    x1="58.7" y1="5.3"
    x2="29.3" y2="34.7"
    stroke="url(#planeCrease)"
    stroke-width="0.9"
    stroke-linecap="round"
  />
</svg>
